                    </div>
                  )}
                  {triggerStatus === "error" && (
                    <div className="error-panel">Failed to queue event — check server logs.</div>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── ScoreboardTab ─────────────────────────────────────────────────────────

    function PredictionCard({ row }) {
      const status     = row.status || "open";
      const borderColor = status === "confirmed" ? "var(--green)" : status === "expired" ? "var(--border2)" : "var(--accent)";
      const adjClass   = {
        forming_team:"adj-forming", layoff_dispersion:"adj-layoff",
        coincidental:"adj-coincidental", unclear:"adj-unclear"
      }[row.claude_verdict] || "adj-unclear";

      const dateStr = row.created_at ? row.created_at.slice(0,10) : "—";

      const evidence = row.evidence_summary || [];

      return (
        <div className="cluster-card" style={{borderLeft:`3px solid ${borderColor}`,marginBottom:10,opacity:status==="expired"?.6:1}}>
          <div style={{padding:"12px 16px"}}>
            {/* header row */}
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
              <span className={`tier-badge tier-${(row.tier||"watch").toLowerCase()}`} style={{fontSize:10,fontWeight:700,
                letterSpacing:".07em",padding:"2px 7px",borderRadius:3,textTransform:"uppercase"}}>
                {row.tier || "—"}
              </span>
              <span
                style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:600,color:"var(--text)",cursor:"help"}}
                title={`Conviction = feature score × verdict confidence. Raw feature score: ${(parseFloat(row.score)||0).toFixed(1)}`}
              >
                {(parseFloat(row.conviction_score ?? row.score)||0).toFixed(1)}
              </span>
              <span style={{fontSize:12,color:"var(--text2)"}}>
                {row.anchor_company || "—"} → {row.destination_name || "(stealth)"}
              </span>
              <span style={{marginLeft:"auto",fontSize:11,fontWeight:600,
                color: status==="confirmed" ? "var(--green)" : status==="expired" ? "var(--text3)" : "var(--amber)"}}>
                {status==="confirmed" ? "✓ confirmed" : status==="expired" ? "✗ expired" : "◷ open"}
              </span>
            </div>

            {/* second row — verdict + lead time or id */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}}>
              <span className={adjClass} style={{fontSize:11,fontWeight:600}}>
                {row.claude_verdict || "—"}
              </span>
              {status==="confirmed" && row.lead_time_days && (
                <span style={{fontSize:11,color:"var(--text3)"}}>· {Math.round(row.lead_time_days/30)} months early</span>
              )}
              {status!=="confirmed" && (
                <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--text3)"}}>{row.prediction_id}</span>
              )}
            </div>

            {/* detection date */}
            {dateStr !== "—" && (
              <div style={{marginBottom:8,fontSize:11,display:"flex",gap:8,alignItems:"center"}}>
                <span style={{color:"var(--text3)"}}>detected:</span>
                <span style={{fontFamily:"var(--mono)",color:"var(--text2)"}}>{dateStr}</span>
              </div>
            )}

            {/* evidence preview */}
            {evidence.slice(0,2).map((ev,i) => {
              const s = ev.supports ?? 0;
              const col = s > 0 ? "var(--green)" : s < 0 ? "var(--red)" : "var(--text3)";
              const sign = s > 0 ? "+" : s < 0 ? "−" : " ";
              const finding = (ev.finding||"").slice(0,60) + ((ev.finding||"").length>60?"…":"");
              return (
                <div key={i} className="log-line" style={{fontSize:11,padding:"1px 0",borderBottom:"1px solid var(--border)"}}>
                  <span style={{fontFamily:"var(--mono)",color:col,marginRight:6}}>
                    [{sign}{Math.abs(s).toFixed(1)}]
                  </span>
                  <span style={{color:"var(--text3)",marginRight:4}}>{ev.source}:</span>
                  <span style={{color:"var(--text2)"}}>{finding}</span>
                </div>
              );
            })}

            {/* reasoning block — open cards only */}
            {status === "open" && (() => {
              const dest    = row.destination_name || "";
              const destId  = row.destination_company_id;
              const verdict = row.claude_verdict || "";
              const members = Array.isArray(row.members) ? row.members : [];

              // group members by current_company
              const byDest = {};
              members.forEach(m => {
                const co = m.current_company || "unknown";
                (byDest[co] = byDest[co] || []).push(m);
              });
              const destNames = Object.keys(byDest);
              const splitDest = destNames.length > 1;

              // detect "0 job postings" in evidence
              const zeroJobs = evidence.some(ev =>
                ev.source === "job_search" && (ev.finding||"").includes("0 job"));

              // build member sentences
              const memberLines = [];
              if (splitDest) {
                // one sentence per destination group
                destNames.forEach(co => {
                  const grp = byDest[co];
                  const names = grp.map(m => {
                    const t = m.anchor_tenure ? ` (${Math.round(m.anchor_tenure)}mo at anchor)` : "";
                    return `${m.name || "unknown"}${t}`;
                  }).join(" and ");
                  const titles = [...new Set(grp.map(m => m.current_title).filter(Boolean))].join("/");
                  memberLines.push(`${names} — ${titles || "role unknown"} at ${co}.`);
                });
              } else {
                // converging — one combined sentence
                const names = members.map(m => {
                  const t = m.anchor_tenure ? ` (${Math.round(m.anchor_tenure)}mo)` : "";
                  return `${m.name || "unknown"}${t}`;
                }).join(" and ");
                const titles = [...new Set(members.map(m => m.current_title).filter(Boolean))].join("/");
                const co = destNames[0] || dest;
                memberLines.push(`${names} — both ${titles || "unknown role"} at ${co}.`);
              }

              // context sentence
              const parts = [...memberLines];
              if (!destId || destId === 0) {
                parts.push(`${dest || "Destination"} not yet indexed — watching for company page or announcement.`);
              } else if (verdict === "forming_team") {
                parts.push(`Destination confirmed (company_id ${destId}). Watching for funding or public launch.`);
              }
              if (verdict === "unclear") {
                parts.push("Convergence partial — confirm whether both are actively co-founding the same entity.");
              }
              if (splitDest) {
                parts.push("Co-departure from anchor confirmed; co-founding at the same company unconfirmed.");
              }
              if (zeroJobs) {
                parts.push("No job postings yet — first hire will be a strong confirmation signal.");
              }

              if (parts.length === 0) return null;
              const para = parts.join(" ");

              // watching-for: name the specific people, not generic signal types
              const watchPeople = members.map(m => m.name).filter(Boolean);
              const watchItems = [];
              if (watchPeople.length > 0) watchItems.push(`${watchPeople.join(", ")} LinkedIn updates`);
              if (!destId || destId === 0) watchItems.push(`${dest || "destination"} Crustdata index entry`);
              if (splitDest) watchItems.push("shared company name in member profiles");
              watchItems.push(`first job posting at ${dest || "destination"}`);
              watchItems.push(`id:${row.prediction_id}`);
              const watching = watchItems.join(" · ");

              return <ReasoningBlock para={para} watching={watching} />;
            })()}
          </div>
        </div>
      );
    }

    function ReasoningBlock({ para, watching }) {
      return (
        <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--border)"}}>
          <p style={{
            borderLeft:"2px solid var(--border2)",
            paddingLeft:10,
            fontSize:11,
            color:"var(--text3)",
            lineHeight:1.6,
            margin:0,
            marginBottom:6,
          }}>{para}</p>
          <p style={{fontSize:10,color:"var(--text3)",margin:0,opacity:.75}}>
            <span style={{fontWeight:600,color:"var(--text3)"}}>Watching for: </span>
            {watching}
          </p>
        </div>
      );
    }

    function ScoreboardTab() {
      const [metrics, setMetrics] = useState(null);
      const [feed, setFeed]       = useState([]);
      const [open, setOpen]       = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError]     = useState(null);

      const fetchAll = useCallback(async () => {
        setLoading(true); setError(null);
        try {
          const [m, f, o] = await Promise.all([
            fetch("/scoreboard/metrics").then(r=>r.json()),
            fetch("/scoreboard/feed").then(r=>r.json()),
            fetch("/scoreboard/open").then(r=>r.json()),
          ]);
          setMetrics(m);
          setFeed(Array.isArray(f) ? f : []);
          setOpen(Array.isArray(o) ? o : []);
        } catch(e) { setError(String(e)); }
        finally { setLoading(false); }
      }, []);

      useEffect(() => { fetchAll(); }, []);

      const TIER_COLORS = {High:"var(--accent)",Medium:"rgba(99,102,241,.4)",Low:"var(--text3)",Watch:"var(--border2)"};

      return (
        <div className="tab-content">
          <div style={{marginBottom:20}}>
            <p style={{fontSize:12,color:"var(--text3)",lineHeight:1.6,maxWidth:640}}>
              Tamper-evident prediction ledger. Each prediction is SHA-256 hash-chained at detection time — each prediction links to the prior, making backdating detectable —
              before any confirmation. Hit rate is confirmed vs. (confirmed + expired).
            </p>
          </div>

          {error && <div className="error-panel" style={{marginBottom:16}}>{error}</div>}

          {/* metrics */}
          {metrics && (
            <div className="cluster-card" style={{marginBottom:24,padding:"16px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <span className="section-label">Metrics</span>
                <button onClick={fetchAll} disabled={loading}
                  style={{background:"none",border:"1px solid var(--border)",borderRadius:4,color:"var(--text3)",
                    cursor:"pointer",padding:"3px 10px",fontSize:12}}>
                  {loading ? "…" : "↺ Refresh"}
                </button>
              </div>
              {/* hit rate bar */}
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <span style={{fontSize:12,color:"var(--text2)",width:70}}>Hit rate</span>
                <div style={{flex:1,background:"var(--border)",borderRadius:2,height:4}}>
                  <div className="confidence-bar-fill conf-forming" style={{width:`${((parseFloat(metrics.hit_rate)||0)*100).toFixed(1)}%`}}/>
                </div>
                <span style={{fontFamily:"var(--mono)",fontSize:12,color:"var(--text)",width:40,textAlign:"right"}}>
                  {((parseFloat(metrics.hit_rate)||0)*100).toFixed(1)}%
                </span>
              </div>
              {/* totals */}
              <div style={{fontSize:11,color:"var(--text3)",marginBottom:12}}>
                ○ Open: {metrics.total_open}&nbsp;&nbsp;
                ✓ Confirmed: {metrics.total_confirmed}&nbsp;&nbsp;
                ✗ Expired: {metrics.total_expired}
              </div>
              {/* tier dots */}
              <div style={{display:"flex",gap:16}}>
                {Object.entries(metrics.tier_breakdown||{}).map(([t,n]) => (
                  <div key={t} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"var(--text3)"}}>
                    <span style={{width:8,height:8,borderRadius:"50%",background:TIER_COLORS[t]||"var(--border2)",display:"inline-block"}}/>
                    {t}: {n}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* confirmed */}
          <div style={{marginBottom:20}}>
            <div className="section-label" style={{marginBottom:10}}>Confirmed Predictions</div>
            {feed.length === 0 ? (
              <div className="empty-state" style={{padding:"24px 0"}}>
                <div style={{color:"var(--text3)",fontSize:12}}>No confirmed predictions yet — open predictions will be confirmed or expired as companies announce.</div>
              </div>
            ) : feed.map((row,i) => <PredictionCard key={row.prediction_id||i} row={{...row,status:"confirmed"}} />)}
          </div>

          {/* open */}
          <div>
            <div className="section-label" style={{marginBottom:10}}>Open Predictions</div>
            {open.length === 0 ? (
              <div className="empty-state" style={{padding:"24px 0"}}>
                <div style={{color:"var(--text3)",fontSize:12}}>No open predictions — run the Radar tab with valid API keys to generate predictions.</div>
              </div>
            ) : open.map((row,i) => <PredictionCard key={row.prediction_id||i} row={{...row,status:"open"}} />)}
          </div>
        </div>
      );
    }

    function ValidationTab() {
      return (
        <div className="tab-content">
          <div style={{marginBottom:16}}>
            <p style={{fontSize:12,color:"var(--text3)",lineHeight:1.6,maxWidth:640}}>
              Case-study validation of the detector against known historical spinouts.
              Not a large-sample recall claim — three cases chosen to verify the three structural
              paths: co-tenure + convergence, the headcount gate, and the method boundary.
            </p>
          </div>
          <div className="backtest-intro">
            <div className="backtest-intro-title">CASE STUDY VALIDATION</div>
            <div className="backtest-intro-desc">
              Case-study validation — given the members, the engine scores real formations correctly and correctly rejects non-signals. Not a large-sample recall claim.
            </div>
          </div>

          {CASE_STUDIES.map((c, i) => (
            <div key={i} className="case-card">
              <div className="case-header">
                <div className={`case-dot ${c.dotClass}`} />
                <span className={`case-type ${c.typeClass}`}>{c.type}</span>
                <span className="case-company">{c.company}</span>
              </div>
              {c.headline && <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:8}}>{c.headline}</div>}
              <div className="case-body">{c.summary}</div>
              <div className="case-metrics">
                {c.metrics.map((m, j) => (
                  <div key={j} className="case-metric">
                    <span className="case-metric-key">{m.key}: </span>
                    <span className="case-metric-val">{m.val}</span>
                  </div>
                ))}
              </div>
              {c.note && <div className="case-note">{c.note}</div>}
            </div>
          ))}
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────────────────

    function App() {
      const [tab, setTab] = useState("Radar");
      const [keys, setKeys] = useState({ crustdata: "", anthropic: "" });
      const [validationStatus, setValidationStatus] = useState({});
      const [validating, setValidating] = useState(false);
      // activeThesis: set when user confirms a thesis in ThesisTab; shared with RadarTab
      const [activeThesis, setActiveThesis] = useState(null);

      const liveMode = validationStatus.crustdata === "valid"
                    && validationStatus.anthropic === "valid";

      const handleValidate = async () => {
        setValidating(true);
        try {
          const res = await fetch("/validate-keys", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              crustdata_key: keys.crustdata || null,
              anthropic_key: keys.anthropic || null,
            }),
          });
          const data = await res.json();
          setValidationStatus(data);
        } catch (e) {
          setValidationStatus({ crustdata: "invalid", anthropic: "invalid" });
        } finally {
          setValidating(false);
        }
      };

      return (
        <div className="main">
          <Header tab={tab} setTab={setTab} />
          <div style={{ display:"flex", minHeight:"calc(100vh - 64px)" }}>
            <KeySidebar
              keys={keys}
              setKeys={setKeys}
              validationStatus={validationStatus}
              onValidate={handleValidate}
              validating={validating}
            />
            <div style={{ flex:1, overflow:"hidden" }}>
              {tab === "Radar"      && <RadarTab keys={keys} liveMode={liveMode} activeThesis={activeThesis} setTab={setTab} />}
              {tab === "Thesis"     && <ThesisTab keys={keys} liveMode={liveMode} onActivate={setActiveThesis} />}
              {tab === "Scoreboard" && <ScoreboardTab />}
              {tab === "Validation" && <ValidationTab />}
              {tab === "TalentFlow" && <TalentFlowTab keys={keys} liveMode={liveMode} />}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
